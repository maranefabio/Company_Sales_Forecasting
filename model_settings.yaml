# Configuration for a single forecast pipeline run, loaded by "PipelineSettings"
# (src/settings/pipeline.py) at import time from "{general_settings.base_path}/model_settings.yaml".
#
# Only a subset of "PipelineSettings" fields are set here; any field not present below falls back to
# its default in the "PipelineSettings" model. In particular, this run leaves unset (and therefore
# defaulted): "valid_targets" (defaults to ("QT", "ASP")), "start_date" (defaults to None, i.e. no
# lower bound), "warmup_days" (366), "buffer_months" (3), "cutoff_freq" ("3MS"),
# "cross_validation_horizon_days" (90), and "output_path" (defaults to "general_settings.base_path").

# Name used to namespace persisted parameters/models/forecasts on disk, under this value.
model_name: "BUD_2026"

# Pipeline steps to run, in this run's case spelled out explicitly rather than via the "ALL"/"ETL"
# shorthands (see "PipelineSettings.treat_pipeline_steps").
pipeline_steps:
#  - EXTRACT
#  - CLEAN
#  - FEATURIZE
  - HYPERPARAMETERIZE
  - FIT
  - FORECAST

# Forecast targets to process this run. Must be a subset of "valid_targets" ("QT", "ASP").
targets:
  - QT
  - ASP

# Upper "YearMonth" bound (inclusive) used to restrict the data used during featurization; no
# "start_date" is set, so the lower bound is left unrestricted.
end_date: '2025-12-01'

# Number of Optuna trials to run per SKU/target during hyperparameter search (overrides the
# "PipelineSettings" default of 15).
optimization_n_trials: 25

# Number of future monthly periods to forecast (matches the "PipelineSettings" default of 12; set
# explicitly here for visibility).
forecast_horizon_months: 12

# Whether generated forecasts include in-sample (historical) dates (matches the "PipelineSettings"
# default of True; set explicitly here for visibility).
include_history: True

# SKUs/materials to process in this run.
skus:
  - '30311510011'
  - '30311510012'
  - '30311510013'
  - '30311510014'
  - '30311510093'
  - '30311510022'
  - '30311510023'
  - '30311510124'
  - '30311510123'
  - '30311510072'
  - '30311510122'
  - '30311510021'
  - '30311510024'
  - '30311510043'
  - '30311510033'

# Name of the source table/query used during the EXTRACT step.
raw_table_name: 'FtoFaturamento'

# Filename for the raw extracted CSV (matches the "PipelineSettings" default; set explicitly here
# for visibility).
raw_data_file_name: 'raw_data.csv'

# Filename for the cleaned/aggregated CSV (matches the "PipelineSettings" default; set explicitly
# here for visibility).
cleaned_data_file_name: 'FactSalesAct.csv'